name: 🔍 Actualizar Fondos Comunitarios

on:
  # Ejecuta cada lunes a las 9:00 AM hora Chile (UTC-3 → 12:00 UTC)
  schedule:
    - cron: '0 12 * * 1'

  # Permite ejecutar manualmente desde GitHub Actions → Run workflow
  workflow_dispatch:

jobs:
  actualizar:
    name: Scraper + Actualización Google Sheets + Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # necesario para hacer git push

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historial completo para que el push funcione limpio

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: 📦 Instalar dependencias
        run: pip install -r scraper/requirements.txt

      - name: 🔍 Ejecutar scraper (sube datos a Google Sheets)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python scraper/main.py

      - name: 📥 Descargar CSVs actualizados desde Google Sheets
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python scripts/descargar_sheets.py

      - name: 💾 Commitear CSVs actualizados al repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos-sheets/
          if git diff --staged --quiet; then
            echo "✅ Sin cambios en los CSVs — nada que commitear"
          else
            git commit -m "🤖 Datos actualizados automáticamente [$(date '+%d/%m/%Y')]"
            git push
            echo "🚀 CSVs pusheados — GitHub Pages se actualiza en ~1 minuto"
          fi

      - name: 📋 Mostrar resultado
        if: always()
        run: echo "Pipeline completado el $(date '+%d/%m/%Y %H:%M') UTC"
