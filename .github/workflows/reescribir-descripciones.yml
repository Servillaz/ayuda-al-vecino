name: ✍️ Reescribir Descripciones en Lenguaje Simple

on:
  workflow_dispatch:   # Solo manual — no corre automáticamente

jobs:
  reescribir:
    name: Reescribir con Claude Haiku
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: 📦 Instalar dependencias
        run: pip install -r scraper/requirements.txt

      - name: ✍️ Reescribir descripciones municipios
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python scripts/reescribir_descripciones.py

      - name: 💾 Commitear CSV actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos-sheets/municipios.csv
          if git diff --staged --quiet; then
            echo "Sin cambios en municipios.csv"
          else
            git commit -m "✍️ Descripciones de beneficios reescritas en lenguaje simple"
            git push
          fi
